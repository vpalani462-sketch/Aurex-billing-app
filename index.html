<!DOCTYPE html>
<html>
<head>
<title>Sri Kumaran Billing Software</title>

<style>
body{
    font-family: Arial;
    margin: 20px;
    background:#f2f2f2;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
}

input, button{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Sri Kumaran Electrical Distributor</h2>
<h3>Billing Software</h3>

<label>Customer Name</label>
<input type="text" placeholder="Customer Name">

<label>Product Name</label>
<input type="text" placeholder="Product Name">

<label>Quantity</label>
<input type="number" placeholder="Quantity">

<label>Price</label>
<input type="number" placeholder="Price">

<button>Generate Bill</button>

</div>

</body>
</html>
